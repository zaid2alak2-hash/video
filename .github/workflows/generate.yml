name: Generate Videos

on:
  workflow_dispatch:
    inputs:
      drive_url:
        description: 'رابط مجلد Drive المشارك (مثال: https://drive.google.com/drive/folders/XXXXX)'
        required: true
      folder_name:
        description: 'اسم المجلد بعد التحميل (مثال: pdf01)'
        required: true
        default: 'pdf01'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade gdown numpy Pillow opencv-python-headless pydub requests
          ffmpeg -version | head -1

      - name: Download project from Drive
        run: |
          gdown --folder "${{ github.event.inputs.drive_url }}"
          echo "📂 محتويات المجلد:"
          ls ${{ github.event.inputs.folder_name }}/
          echo "📋 ملفات JSON:"
          ls ${{ github.event.inputs.folder_name }}/input/json/ | wc -l
          echo "🔊 ملفات Audio:"
          ls ${{ github.event.inputs.folder_name }}/input/audio/ | wc -l
          echo "💾 حجم المشروع:"
          du -sh ${{ github.event.inputs.folder_name }}/

      - name: Generate videos
        run: |
          cd ${{ github.event.inputs.folder_name }}
          export VIDEO_TEMP_DIR=/tmp/video_temp
          mkdir -p /tmp/video_temp output
          python batch_generate.py --skip_existing --crf 56 --fps 20 --parts 3

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.event.inputs.folder_name }}
          path: ${{ github.event.inputs.folder_name }}/output/
          retention-days: 5
