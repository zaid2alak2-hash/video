name: Generate Videos

on:
  workflow_dispatch:
    inputs:
      project_zip:
        description: 'اسم ملف ZIP في آخر Release (مثال: pdf01.zip)'
        required: true
        default: 'pdf01.zip'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    outputs:
      folder_name: ${{ steps.setup.outputs.folder_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install numpy Pillow opencv-python-headless pydub requests
          ffmpeg -version | head -1

      - name: Download and extract project
        id: setup
        run: |
          gh release download --pattern "${{ github.event.inputs.project_zip }}" --dir .
          unzip "${{ github.event.inputs.project_zip }}"

          FOLDER_NAME="${{ github.event.inputs.project_zip }}"
          FOLDER_NAME="${FOLDER_NAME%.zip}"

          if [ ! -d "$FOLDER_NAME" ]; then
            mkdir -p "$FOLDER_NAME"
            for item in input assets *.py *.txt *.ipynb; do
              [ -e "$item" ] && mv "$item" "$FOLDER_NAME/"
            done
          fi

          echo "folder_name=$FOLDER_NAME" >> $GITHUB_OUTPUT
          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV
          echo "📂 محتويات المجلد:"
          ls "$FOLDER_NAME"/
          echo "📋 ملفات JSON:"
          ls "$FOLDER_NAME"/input/json/ | wc -l
          echo "🔊 ملفات Audio:"
          ls "$FOLDER_NAME"/input/audio/ | wc -l
          echo "💾 حجم المشروع:"
          du -sh "$FOLDER_NAME"/
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate WebM videos
        run: |
          cd ${{ env.FOLDER_NAME }}
          export VIDEO_TEMP_DIR=/tmp/video_temp
          mkdir -p /tmp/video_temp output
          python batch_generate.py --skip_existing --crf 56 --fps 20 --parts 3

      - name: Upload WebM output
        uses: actions/upload-artifact@v4
        with:
          name: webm-${{ env.FOLDER_NAME }}
          path: ${{ env.FOLDER_NAME }}/output/
          retention-days: 5

  convert:
    needs: generate
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Download WebM artifacts
        uses: actions/download-artifact@v4
        with:
          name: webm-${{ needs.generate.outputs.folder_name }}
          path: webm_input/

      - name: Convert WebM to MOV (HEVC Alpha)
        run: |
          mkdir -p mov_output
          TOTAL=$(ls webm_input/*.webm 2>/dev/null | wc -l)
          echo "📹 تحويل $TOTAL ملف WebM → MOV HEVC Alpha..."
          COUNT=0
          for f in webm_input/*.webm; do
            [ -f "$f" ] || continue
            COUNT=$((COUNT + 1))
            base=$(basename "$f" .webm)
            echo "  ⏳ [$COUNT/$TOTAL] $base..."
            ffmpeg -y \
              -vcodec libvpx-vp9 \
              -i "$f" \
              -c:v hevc_videotoolbox \
              -allow_sw 1 \
              -alpha_quality 0.75 \
              -b:v 360k \
              -tag:v hvc1 \
              -c:a aac \
              -b:a 64k \
              -movflags +faststart \
              "mov_output/${base}.mov" 2>/dev/null && echo "  ✅ $base.mov" || echo "  ❌ $base فشل"
          done
          echo ""
          echo "📊 النتائج:"
          ls mov_output/*.mov 2>/dev/null | wc -l
          du -sh mov_output/

      - name: Upload MOV output
        uses: actions/upload-artifact@v4
        with:
          name: mov-${{ needs.generate.outputs.folder_name }}
          path: mov_output/
          retention-days: 5
